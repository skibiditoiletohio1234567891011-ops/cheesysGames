<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Arcade | Unblocked Games</title>
  </head>
  <body class="min-h-screen bg-black font-sans text-zinc-100 selection:bg-indigo-500/30">
    
    <!-- Navbar -->
    <nav class="sticky top-0 z-40 w-full border-b border-white/10 bg-black/50 backdrop-blur-xl">
      <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-2">
          <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-indigo-600 shadow-lg shadow-indigo-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>
          </div>
          <span class="text-xl font-bold tracking-tight text-white sm:text-2xl">
            NEXUS <span class="text-indigo-500">ARCADE</span>
          </span>
        </div>

        <div class="relative flex flex-1 max-w-md ml-8">
          <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-400"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </div>
          <input
            id="search-input"
            type="text"
            class="block w-full rounded-full border border-white/10 bg-zinc-900 py-2 pl-10 pr-3 text-sm text-white placeholder-zinc-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 transition-all"
            placeholder="Search for a game..."
          />
        </div>
      </div>
    </nav>

    <main class="mx-auto max-w-7xl px-4 pb-20 sm:px-6 lg:px-8">
      <!-- Filters Header -->
      <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-white/5 bg-black">
        <div id="category-filters" class="flex flex-wrap items-center gap-2 px-4 py-6 sm:px-6 lg:px-8">
          <!-- Categories will be injected here -->
        </div>
        <div id="results-count" class="px-4 py-4 sm:px-6 lg:px-8 text-xs font-medium text-zinc-500 italic">
          Loading games...
        </div>
      </div>

      <!-- Games Grid -->
      <div id="games-grid" class="mt-8 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        <!-- Games will be injected here -->
      </div>
    </main>

    <!-- Game Modal -->
    <div id="game-modal" class="hidden fixed inset-0 z-50 items-center justify-center p-4 sm:p-6 lg:p-8">
      <div class="absolute inset-0 bg-black/90 backdrop-blur-sm"></div>
      
      <div class="relative flex h-full w-full max-w-6xl flex-col overflow-hidden rounded-3xl bg-zinc-950 border border-white/10 shadow-2xl shadow-indigo-500/10">
        <div class="flex items-center justify-between border-b border-white/5 bg-zinc-900/50 px-6 py-4">
          <div class="flex items-center gap-4">
            <img id="modal-thumbnail" src="" alt="" class="h-8 w-8 rounded-lg object-cover" />
            <div>
              <h2 id="modal-title" class="text-lg font-bold text-white tracking-tight leading-none"></h2>
              <p id="modal-category" class="mt-1 text-xs text-zinc-500 font-medium"></p>
            </div>
          </div>
          
          <div class="flex items-center gap-2">
            <button id="reload-game" class="flex h-9 w-9 items-center justify-center rounded-lg hover:bg-white/5 text-zinc-400 hover:text-white transition-colors" title="Reload Game">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
            </button>
            <button id="fullscreen-game" class="flex h-9 w-9 items-center justify-center rounded-lg hover:bg-white/5 text-zinc-400 hover:text-white transition-colors" title="Fullscreen">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M21 8V5a2 2 0 0 0-2-2h-3"></path><path d="M3 16v3a2 2 0 0 0 2 2h3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>
            </button>
            <button id="close-modal" class="flex h-9 w-9 items-center justify-center rounded-lg bg-zinc-800 hover:bg-zinc-700 text-white transition-colors ml-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
        </div>

        <div class="relative flex-1 bg-zinc-900">
          <iframe id="game-iframe" src="" class="h-full w-full border-none" allow="autoplay; fullscreen; keyboard"></iframe>
        </div>
        
        <div class="bg-zinc-900 px-6 py-3 select-none">
          <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-zinc-600 text-center">
            Playing on Nexus Arcade • Quality Ensured
          </p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-12 px-4 sm:px-6 lg:px-8 bg-zinc-950/50">
      <div class="mx-auto max-w-7xl flex flex-col items-center justify-center gap-6">
        <div class="flex gap-8 text-xs font-medium text-zinc-500 tracking-wide uppercase">
          <a href="#" class="hover:text-zinc-300 transition-colors">Privacy Policy</a>
          <a href="#" class="hover:text-zinc-300 transition-colors">Terms of Service</a>
          <a href="#" class="hover:text-zinc-300 transition-colors">Contact</a>
        </div>
        <p class="text-[10px] text-zinc-600 font-medium">
          &copy; <span id="current-year"></span> Nexus Arcade. All games are property of their respective owners.
        </p>
      </div>
    </footer>

    <script>
      document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
